<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRP — Panel Interno</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#CC1010" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GRP" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables de marca ── */
    :root {
      --rojo: #CC1010;
      --rojo-oscuro: #A50D0D;
      --carbon: #2A2A2A;
      --carbon-claro: #3D3D3D;
      --blanco: #FFFFFF;
      --gris-fondo: #F5F5F5;
      --gris-borde: #E0E0E0;
      --gris-texto: #666666;
      --sombra: 0 4px 20px rgba(0,0,0,0.12);
      --radio: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--gris-fondo);
      color: var(--carbon);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--carbon);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 0;
    }

    .logo svg { width: 48px; height: 48px; }

    .logo-texto {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-texto span:first-child {
      font-size: 18px;
      font-weight: 900;
      color: var(--blanco);
      letter-spacing: 2px;
    }

    .logo-texto span:last-child {
      font-size: 9px;
      font-weight: 300;
      color: var(--rojo);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    nav {
      display: flex;
      gap: 4px;
    }

    nav button {
      background: transparent;
      border: none;
      color: #999;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav button:hover { background: rgba(255,255,255,0.08); color: var(--blanco); }

    nav button.active {
      background: var(--rojo);
      color: var(--blanco);
    }

    nav button svg { width: 16px; height: 16px; }

    /* ── WAVE ── */
    .wave-top {
      background: var(--carbon);
      height: 50px;
      position: relative;
      overflow: hidden;
    }

    .wave-top::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: -5%;
      width: 110%;
      height: 60px;
      background: var(--gris-fondo);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .seccion { display: none; }
    .seccion.activa { display: block; }

    .seccion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .seccion-titulo {
      font-size: 26px;
      font-weight: 900;
      color: var(--carbon);
      letter-spacing: -0.5px;
    }

    .seccion-titulo span {
      color: var(--rojo);
    }

    /* ── BOTÓN PRINCIPAL ── */
    .btn-primary {
      background: var(--rojo);
      color: var(--blanco);
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 12px 22px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--rojo-oscuro); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secundario {
      background: transparent;
      color: var(--gris-texto);
      border: 1.5px solid var(--gris-borde);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secundario:hover {
      border-color: var(--carbon);
      color: var(--carbon);
    }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }

    .overlay.visible { display: flex; }

    .modal {
      background: var(--blanco);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--carbon);
    }

    .modal h3 span { color: var(--rojo); }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gris-texto);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      border: 1.5px solid var(--gris-borde);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: var(--carbon);
      background: var(--gris-fondo);
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--rojo);
      background: var(--blanco);
    }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .modal-acciones {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--carbon);
      color: var(--blanco);
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--sombra);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      border-left: 4px solid var(--rojo);
    }

    #toast.show { transform: translateY(0); opacity: 1; }

    /* ════════════════════════════════════════
       NOTAS
    ════════════════════════════════════════ */
    .notas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .nota-card {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 22px;
      box-shadow: var(--sombra);
      border-top: 4px solid var(--rojo);
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .nota-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    .nota-card h4 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--carbon);
      word-break: break-word;
    }

    .nota-card p {
      font-size: 13px;
      color: var(--gris-texto);
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .nota-fecha {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #bbb;
      margin-top: 16px;
      text-transform: uppercase;
    }

    .nota-acciones {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .nota-card:hover .nota-acciones { opacity: 1; }

    .btn-icono {
      background: var(--gris-fondo);
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-icono:hover { background: var(--gris-borde); }
    .btn-icono.eliminar:hover { background: #FFE5E5; }
    .btn-icono svg { width: 14px; height: 14px; }

    .notas-vacio {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: #ccc;
    }

    .notas-vacio svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
    .notas-vacio p { font-size: 14px; }

    /* Etiqueta de color */
    .nota-color-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-opcion {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }

    .color-opcion:hover { transform: scale(1.15); }
    .color-opcion.seleccionado { border-color: var(--carbon); }

    /* ════════════════════════════════════════
       AGENDA
    ════════════════════════════════════════ */
    .agenda-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }

    .calendario-card {
      background: var(--blanco);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      overflow: hidden;
    }

    .cal-header {
      background: var(--carbon);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cal-header h3 {
      color: var(--blanco);
      font-size: 16px;
      font-weight: 700;
      text-transform: capitalize;
    }

    .cal-nav {
      background: transparent;
      border: none;
      color: var(--blanco);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
    }

    .cal-nav:hover { background: rgba(255,255,255,0.15); }
    .cal-nav svg { width: 18px; height: 18px; }

    .cal-dias-semana {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--carbon-claro);
      padding: 8px 12px;
    }

    .cal-dia-nombre {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #aaa;
      text-transform: uppercase;
      padding: 4px 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 12px;
      gap: 4px;
    }

    .cal-celda {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--carbon);
      position: relative;
      transition: background 0.15s;
      gap: 3px;
    }

    .cal-celda:hover:not(.vacio) { background: var(--gris-fondo); }

    .cal-celda.hoy {
      background: var(--rojo);
      color: var(--blanco);
    }

    .cal-celda.hoy:hover { background: var(--rojo-oscuro); }

    .cal-celda.seleccionado:not(.hoy) {
      background: #FFE5E5;
      color: var(--rojo);
    }

    .cal-celda.vacio { cursor: default; }

    .cal-celda.otro-mes { color: #ccc; }

    .cal-puntos {
      display: flex;
      gap: 2px;
      position: absolute;
      bottom: 4px;
    }

    .cal-punto {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--rojo);
    }

    .hoy .cal-punto { background: var(--blanco); }

    /* Panel lateral de eventos */
    .eventos-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .eventos-panel-header {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 20px;
      box-shadow: var(--sombra);
    }

    .eventos-panel-header h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--carbon);
      margin-bottom: 4px;
    }

    .eventos-panel-header span {
      font-size: 11px;
      color: var(--gris-texto);
    }

    .eventos-lista {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .evento-item {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 16px 18px;
      box-shadow: var(--sombra);
      border-left: 4px solid var(--rojo);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .evento-info h5 {
      font-size: 14px;
      font-weight: 700;
      color: var(--carbon);
      margin-bottom: 4px;
    }

    .evento-info span {
      font-size: 11px;
      color: var(--gris-texto);
    }

    .evento-hora {
      font-size: 12px;
      font-weight: 700;
      color: var(--rojo);
      white-space: nowrap;
    }

    .eventos-vacio {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 32px 20px;
      text-align: center;
      box-shadow: var(--sombra);
      color: #ccc;
      font-size: 13px;
    }

    .btn-ics {
      background: transparent;
      border: 1.5px solid #0078D4;
      color: #0078D4;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-ics:hover { background: #0078D4; color: white; }
    .btn-ics svg  { width: 12px; height: 12px; }

    .alarma-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #FFF3E0;
      color: #E65100;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 5px;
    }

    .alarma-badge svg { width: 11px; height: 11px; }

    /* ════════════════════════════════════════
       RECORDATORIOS
    ════════════════════════════════════════ */
    .recordatorios-lista {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .recordatorio-item {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 18px 22px;
      box-shadow: var(--sombra);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: opacity 0.3s;
    }

    .recordatorio-item.completado { opacity: 0.45; }

    .rec-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid var(--gris-borde);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }

    .rec-check:hover { border-color: var(--rojo); }

    .completado .rec-check {
      background: var(--rojo);
      border-color: var(--rojo);
    }

    .rec-check svg { width: 12px; height: 12px; display: none; }
    .completado .rec-check svg { display: block; }

    .rec-info { flex: 1; }

    .rec-titulo {
      font-size: 14px;
      font-weight: 700;
      color: var(--carbon);
      margin-bottom: 4px;
    }

    .completado .rec-titulo { text-decoration: line-through; color: #aaa; }

    .rec-descripcion {
      font-size: 12px;
      color: var(--gris-texto);
      margin-bottom: 6px;
    }

    .rec-fecha-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--gris-fondo);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gris-texto);
    }

    .rec-fecha-badge.vence-hoy {
      background: #FFF3E0;
      color: #E65100;
    }

    .rec-fecha-badge.vencido {
      background: #FFE5E5;
      color: var(--rojo);
    }

    .rec-fecha-badge svg { width: 12px; height: 12px; }

    .rec-eliminar {
      background: transparent;
      border: none;
      color: #ddd;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
    }

    .rec-eliminar:hover { background: #FFE5E5; color: var(--rojo); }
    .rec-eliminar svg { width: 16px; height: 16px; }

    .rec-vacio {
      text-align: center;
      padding: 80px 20px;
      color: #ccc;
    }

    .rec-vacio svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }

    .rec-prioridad {
      width: 6px;
      height: 100%;
      min-height: 40px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Barra de acento rojo inferior */
    .barra-inferior {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--carbon) 0%, var(--rojo) 50%, var(--carbon) 100%);
    }

    /* ── Responsivo ── */
    @media (max-width: 768px) {
      header { padding: 0 16px; }
      nav button span { display: none; }
      .agenda-layout { grid-template-columns: 1fr; }
      main { padding: 24px 16px 60px; }
      .seccion-titulo { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->

<script>
// ═══════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════
let notas        = JSON.parse(localStorage.getItem('grp_notas') || '[]');
let eventos      = JSON.parse(localStorage.getItem('grp_eventos') || '[]');
let recordatorios = JSON.parse(localStorage.getItem('grp_recordatorios') || '[]');

let notaEditandoId = null;
let colorSeleccionado = '#CC1010';
let calFecha = new Date();
let diaSeleccionado = new Date();

// ═══════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════
function uuid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function guardar() {
  localStorage.setItem('grp_notas', JSON.stringify(notas));
  localStorage.setItem('grp_eventos', JSON.stringify(eventos));
  localStorage.setItem('grp_recordatorios', JSON.stringify(recordatorios));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function fechaLegible(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-CO', { weekday:'long', day:'numeric', month:'long' });
}

function fechaCorta(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-CO', { day:'numeric', month:'short', year:'numeric' });
}

function hoyIso() {
  const h = new Date();
  return `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}-${String(h.getDate()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════
function mostrarSeccion(id, btn) {
  document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('activa');
  btn.classList.add('active');
  if (id === 'agenda') renderCalendario();
}

// ═══════════════════════════════════════
// NOTAS
// ═══════════════════════════════════════
function renderNotas() {
  const grid = document.getElementById('notas-grid');
  if (!notas.length) {
    grid.innerHTML = `
      <div class="notas-vacio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>No tenés notas todavía.<br/>Creá tu primera nota.</p>
      </div>`;
    return;
  }
  grid.innerHTML = notas.map(n => `
    <div class="nota-card" style="border-top-color:${n.color}" onclick="abrirModalNota('${n.id}')">
      <div class="nota-acciones">
        <button class="btn-icono eliminar" onclick="eliminarNota(event,'${n.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="#CC1010" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
      <h4>${escapeHtml(n.titulo) || 'Sin título'}</h4>
      <p>${escapeHtml(n.contenido)}</p>
      <div class="nota-fecha">${fechaCorta(n.fecha)}</div>
    </div>`).join('');
}

function abrirModalNota(id = null) {
  notaEditandoId = id;
  const overlay = document.getElementById('overlay-nota');
  const titulo  = document.getElementById('modal-nota-titulo');
  if (id) {
    const nota = notas.find(n => n.id === id);
    document.getElementById('nota-titulo').value    = nota.titulo;
    document.getElementById('nota-contenido').value = nota.contenido;
    colorSeleccionado = nota.color;
    document.querySelectorAll('.color-opcion').forEach(c => {
      c.classList.toggle('seleccionado', c.dataset.color === nota.color);
    });
    titulo.innerHTML = 'Editar <span>Nota</span>';
  } else {
    document.getElementById('nota-titulo').value    = '';
    document.getElementById('nota-contenido').value = '';
    colorSeleccionado = '#CC1010';
    document.querySelectorAll('.color-opcion').forEach((c, i) => {
      c.classList.toggle('seleccionado', i === 0);
    });
    titulo.innerHTML = 'Nueva <span>Nota</span>';
  }
  overlay.classList.add('visible');
  document.getElementById('nota-titulo').focus();
}

function cerrarModalNota(e) {
  if (!e || e.target === document.getElementById('overlay-nota')) {
    document.getElementById('overlay-nota').classList.remove('visible');
  }
}

function seleccionarColor(el) {
  document.querySelectorAll('.color-opcion').forEach(c => c.classList.remove('seleccionado'));
  el.classList.add('seleccionado');
  colorSeleccionado = el.dataset.color;
}

function guardarNota() {
  const titulo    = document.getElementById('nota-titulo').value.trim();
  const contenido = document.getElementById('nota-contenido').value.trim();
  if (!titulo && !contenido) { toast('Escribí algo antes de guardar.'); return; }

  if (notaEditandoId) {
    const idx = notas.findIndex(n => n.id === notaEditandoId);
    notas[idx] = { ...notas[idx], titulo, contenido, color: colorSeleccionado };
    toast('Nota actualizada');
  } else {
    notas.unshift({ id: uuid(), titulo, contenido, color: colorSeleccionado, fecha: hoyIso() });
    toast('Nota guardada');
  }
  guardar();
  renderNotas();
  document.getElementById('overlay-nota').classList.remove('visible');
}

function eliminarNota(e, id) {
  e.stopPropagation();
  notas = notas.filter(n => n.id !== id);
  guardar();
  renderNotas();
  toast('Nota eliminada');
}

function escapeHtml(str = '') {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════
// AGENDA / CALENDARIO
// ═══════════════════════════════════════
function renderCalendario() {
  const grid   = document.getElementById('cal-grid');
  const titulo = document.getElementById('cal-titulo');
  const y = calFecha.getFullYear();
  const m = calFecha.getMonth();

  titulo.textContent = calFecha.toLocaleDateString('es-CO', { month:'long', year:'numeric' });

  const primerDia = new Date(y, m, 1).getDay();
  const diasEnMes = new Date(y, m + 1, 0).getDate();
  const hoy = new Date();

  let html = '';

  // Celdas vacías al inicio
  for (let i = 0; i < primerDia; i++) {
    html += '<div class="cal-celda vacio"></div>';
  }

  for (let d = 1; d <= diasEnMes; d++) {
    const isoDate = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const esHoy = hoy.getFullYear()===y && hoy.getMonth()===m && hoy.getDate()===d;
    const esSel = diaSeleccionado.getFullYear()===y && diaSeleccionado.getMonth()===m && diaSeleccionado.getDate()===d;
    const tieneEventos = eventos.filter(e => e.fecha === isoDate).length;

    let cls = 'cal-celda';
    if (esHoy) cls += ' hoy';
    else if (esSel) cls += ' seleccionado';

    const puntos = tieneEventos
      ? `<div class="cal-puntos">${Array(Math.min(tieneEventos,3)).fill('<div class="cal-punto"></div>').join('')}</div>`
      : '';

    html += `<div class="${cls}" onclick="seleccionarDia(${y},${m},${d})">${d}${puntos}</div>`;
  }

  grid.innerHTML = html;
  renderEventosDia();
}

function cambiarMes(dir) {
  calFecha.setMonth(calFecha.getMonth() + dir);
  renderCalendario();
}

function seleccionarDia(y, m, d) {
  diaSeleccionado = new Date(y, m, d);
  renderCalendario();
}

function renderEventosDia() {
  const isoDate = `${diaSeleccionado.getFullYear()}-${String(diaSeleccionado.getMonth()+1).padStart(2,'0')}-${String(diaSeleccionado.getDate()).padStart(2,'0')}`;
  const lista = document.getElementById('eventos-lista');
  const ftitulo = document.getElementById('eventos-fecha-titulo');
  const fsub    = document.getElementById('eventos-fecha-sub');

  const hoy = new Date();
  const esHoy = diaSeleccionado.toDateString() === hoy.toDateString();
  ftitulo.textContent = esHoy ? 'Hoy' : diaSeleccionado.toLocaleDateString('es-CO', { weekday:'long' });
  fsub.textContent = fechaLegible(isoDate);

  const del = eventos.filter(e => e.fecha === isoDate).sort((a,b) => (a.hora||'').localeCompare(b.hora||''));

  if (!del.length) {
    lista.innerHTML = '<div class="eventos-vacio">Sin eventos para este día</div>';
    return;
  }

  lista.innerHTML = del.map(e => `
    <div class="evento-item">
      <div class="evento-info" style="flex:1">
        <h5>${escapeHtml(e.titulo)}</h5>
        ${e.desc ? `<span>${escapeHtml(e.desc)}</span>` : ''}
        ${e.hora ? `<div class="alarma-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Alarma 15 min antes
        </div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        ${e.hora ? `<div class="evento-hora">${e.hora}</div>` : ''}
        <button class="btn-ics" onclick="exportarICS(${JSON.stringify(e).replace(/"/g,'&quot;')})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Agregar a Outlook
        </button>
        <button class="btn-icono eliminar" onclick="eliminarEvento('${e.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="#CC1010" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function abrirModalEvento() {
  const isoDate = `${diaSeleccionado.getFullYear()}-${String(diaSeleccionado.getMonth()+1).padStart(2,'0')}-${String(diaSeleccionado.getDate()).padStart(2,'0')}`;
  document.getElementById('evento-titulo').value = '';
  document.getElementById('evento-desc').value   = '';
  document.getElementById('evento-fecha').value  = isoDate;
  document.getElementById('evento-hora').value   = '';
  document.getElementById('overlay-evento').classList.add('visible');
  document.getElementById('evento-titulo').focus();
}

function cerrarModalEvento(e) {
  if (!e || e.target === document.getElementById('overlay-evento')) {
    document.getElementById('overlay-evento').classList.remove('visible');
  }
}

function guardarEvento() {
  const titulo    = document.getElementById('evento-titulo').value.trim();
  const desc      = document.getElementById('evento-desc').value.trim();
  const fecha     = document.getElementById('evento-fecha').value;
  const hora      = document.getElementById('evento-hora').value;
  const duracion  = parseInt(document.getElementById('evento-duracion').value, 10);
  if (!titulo) { toast('Poné un nombre al evento.'); return; }
  if (!fecha)  { toast('Seleccioná una fecha.'); return; }

  eventos.push({ id: uuid(), titulo, desc, fecha, hora, duracion });
  guardar();
  renderCalendario();
  document.getElementById('overlay-evento').classList.remove('visible');
  toast(hora ? 'Evento guardado — alarma activada a las ' + horaAlerta(hora) : 'Evento guardado');
  pedirPermisosNotificacion();
}

function eliminarEvento(id) {
  eventos = eventos.filter(e => e.id !== id);
  guardar();
  renderCalendario();
  toast('Evento eliminado');
}

// ═══════════════════════════════════════
// EXPORTAR A OUTLOOK (.ics)
// ═══════════════════════════════════════
function exportarICS(e) {
  const durMin = e.duracion || 60;
  const dtStart = isoParaICS(e.fecha, e.hora || '09:00');
  const dtEnd   = sumarMinutos(e.fecha, e.hora || '09:00', durMin);

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Gato Rojo Publicidad//Panel GRP//ES',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${e.id}@grp`,
    `DTSTART:${dtStart}`,
    `DTEND:${dtEnd}`,
    `SUMMARY:${e.titulo}`,
    e.desc ? `DESCRIPTION:${e.desc.replace(/\n/g,'\\n')}` : '',
    'BEGIN:VALARM',
    'TRIGGER:-PT15M',
    'ACTION:DISPLAY',
    `DESCRIPTION:Recordatorio: ${e.titulo}`,
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${e.titulo.replace(/[^a-zA-Z0-9]/g,'-')}.ics`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Archivo .ics descargado — abrilo para importar a Outlook');
}

function isoParaICS(fecha, hora) {
  const [y, m, d] = fecha.split('-');
  const [hh, mm]  = hora.split(':');
  return `${y}${m}${d}T${hh}${mm}00`;
}

function sumarMinutos(fecha, hora, minutos) {
  const [y, m, d]  = fecha.split('-').map(Number);
  const [hh, mm]   = hora.split(':').map(Number);
  const dt = new Date(y, m - 1, d, hh, mm + minutos);
  return [
    String(dt.getFullYear()),
    String(dt.getMonth() + 1).padStart(2,'0'),
    String(dt.getDate()).padStart(2,'0')
  ].join('') + 'T' + [
    String(dt.getHours()).padStart(2,'0'),
    String(dt.getMinutes()).padStart(2,'0')
  ].join('') + '00';
}

function horaAlerta(hora) {
  const [hh, mm] = hora.split(':').map(Number);
  const d = new Date(2000, 0, 1, hh, mm - 15);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════
// SISTEMA DE ALARMAS (revisa cada minuto)
// ═══════════════════════════════════════
const alertasDisparadas = new Set(JSON.parse(sessionStorage.getItem('grp_alertas') || '[]'));

function chequearAlarmas() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  const ahora  = new Date();
  const hoy    = hoyIso();
  const hhmm   = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}`;

  eventos.forEach(e => {
    if (!e.hora || e.fecha !== hoy) return;
    const key = `${e.id}-${e.fecha}`;
    if (alertasDisparadas.has(key)) return;

    const [hh, mm] = e.hora.split(':').map(Number);
    const eventoMs = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate(), hh, mm).getTime();
    const diffMin  = (eventoMs - ahora.getTime()) / 60000;

    if (diffMin >= 14 && diffMin < 15.5) {
      alertasDisparadas.add(key);
      sessionStorage.setItem('grp_alertas', JSON.stringify([...alertasDisparadas]));
      dispararAlarma(e);
    }
  });
}

function dispararAlarma(evento) {
  // Notificación visual
  new Notification('🔔 GRP — Reunión en 15 minutos', {
    body: `${evento.titulo}${evento.desc ? '\n' + evento.desc : ''}\nHora: ${evento.hora}`,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23CC1010"/><text y="68" x="50" text-anchor="middle" font-size="55" fill="white">🐱</text></svg>',
    requireInteraction: true
  });

  // Sonido con Web Audio API
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const beep = (freq, start, dur) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.4, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    beep(880, 0,    0.15);
    beep(880, 0.2,  0.15);
    beep(1100, 0.4, 0.3);
  } catch(err) { /* Audio no disponible */ }

  // Toast en pantalla también
  toast(`⏰ Reunión en 15 min: ${evento.titulo}`);
}

// ═══════════════════════════════════════
// RECORDATORIOS
// ═══════════════════════════════════════
const PRIORIDAD_COLORES = { alta: '#CC1010', media: '#E65100', baja: '#2E7D32' };

function renderRecordatorios() {
  const lista = document.getElementById('recordatorios-lista');
  if (!recordatorios.length) {
    lista.innerHTML = `
      <div class="rec-vacio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <p>No tenés recordatorios.<br/>Creá uno para no olvidar nada.</p>
      </div>`;
    return;
  }

  const hoy = hoyIso();
  const ordenados = [...recordatorios].sort((a,b) => {
    if (a.completado !== b.completado) return a.completado ? 1 : -1;
    return (a.fecha||'9999') < (b.fecha||'9999') ? -1 : 1;
  });

  lista.innerHTML = ordenados.map(r => {
    let badgeClass = '';
    let badgeTexto = r.fecha ? fechaCorta(r.fecha) : 'Sin fecha';
    if (r.fecha) {
      if (r.fecha < hoy)      { badgeClass = 'vencido'; badgeTexto = 'Vencido · ' + fechaCorta(r.fecha); }
      else if (r.fecha === hoy) { badgeClass = 'vence-hoy'; badgeTexto = 'Hoy · ' + fechaCorta(r.fecha); }
    }

    return `
    <div class="recordatorio-item ${r.completado ? 'completado' : ''}" id="rec-${r.id}">
      <div class="rec-prioridad" style="background:${PRIORIDAD_COLORES[r.prioridad] || '#aaa'}"></div>
      <div class="rec-check" onclick="toggleRecordatorio('${r.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="rec-info">
        <div class="rec-titulo">${escapeHtml(r.titulo)}</div>
        ${r.desc ? `<div class="rec-descripcion">${escapeHtml(r.desc)}</div>` : ''}
        <span class="rec-fecha-badge ${badgeClass}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${badgeTexto}
        </span>
      </div>
      <button class="rec-eliminar" onclick="eliminarRecordatorio('${r.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>`;
  }).join('');
}

function abrirModalRecordatorio() {
  document.getElementById('rec-titulo').value    = '';
  document.getElementById('rec-desc').value      = '';
  document.getElementById('rec-fecha').value     = hoyIso();
  document.getElementById('rec-prioridad').value = 'media';
  document.getElementById('overlay-rec').classList.add('visible');
  document.getElementById('rec-titulo').focus();
}

function cerrarModalRec(e) {
  if (!e || e.target === document.getElementById('overlay-rec')) {
    document.getElementById('overlay-rec').classList.remove('visible');
  }
}

function guardarRecordatorio() {
  const titulo    = document.getElementById('rec-titulo').value.trim();
  const desc      = document.getElementById('rec-desc').value.trim();
  const fecha     = document.getElementById('rec-fecha').value;
  const prioridad = document.getElementById('rec-prioridad').value;
  if (!titulo) { toast('Poné un título al recordatorio.'); return; }

  recordatorios.push({ id: uuid(), titulo, desc, fecha, prioridad, completado: false });
  guardar();
  renderRecordatorios();
  document.getElementById('overlay-rec').classList.remove('visible');
  toast('Recordatorio guardado');
  pedirPermisosNotificacion();
}

function toggleRecordatorio(id) {
  const r = recordatorios.find(r => r.id === id);
  r.completado = !r.completado;
  guardar();
  renderRecordatorios();
  toast(r.completado ? 'Marcado como completado' : 'Marcado como pendiente');
}

function eliminarRecordatorio(id) {
  recordatorios = recordatorios.filter(r => r.id !== id);
  guardar();
  renderRecordatorios();
  toast('Recordatorio eliminado');
}

// ═══════════════════════════════════════
// NOTIFICACIONES
// ═══════════════════════════════════════
function pedirPermisosNotificacion() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function chequearRecordatoriosHoy() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const hoy = hoyIso();
  recordatorios
    .filter(r => !r.completado && r.fecha === hoy)
    .forEach(r => {
      new Notification('⏰ GRP — Recordatorio', {
        body: r.titulo + (r.desc ? '\n' + r.desc : ''),
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23CC1010"/></svg>'
      });
    });
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderNotas();
renderRecordatorios();
pedirPermisosNotificacion();
chequearRecordatoriosHoy();
chequearAlarmas();
setInterval(chequearAlarmas, 60000);
</script>
